{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 mt-3">
            <div class="card-header bg-danger text-white text-center py-3">
                <h4 class="mb-0"><i class="bi bi-arrow-left-circle"></i> Registrar Salida</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="/exit">
                    <div class="mb-4">
                        <label for="ticket" class="form-label fw-bold">ID del Ticket</label>
                        <input type="number" class="form-control form-control-lg" id="ticket" name="ticket" required
                            placeholder="Ej: 1">
                    </div>
                    <div class="mb-4">
                        <label for="hours" class="form-label fw-bold">Horas Estacionado</label>
                        <input type="number" class="form-control form-control-lg" id="hours" name="hours" required
                            min="1" placeholder="Ej: 2">
                        <div class="form-text">Mínimo 1 hora de cobro.</div>
                    </div>
                    <button type="submit" class="btn btn-danger btn-lg w-100">Procesar Salida y Cobrar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
